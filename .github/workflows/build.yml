name: Build

on:
  push:
    branches:
      - main
      - master

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: SkriptDeploy-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14