name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify tag matches Gradle version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(./gradlew properties -q | sed -n 's/^version: //p')

          echo "Tag version: $TAG_VERSION"
          echo "Gradle version: $GRADLE_VERSION"

          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Gradle version $GRADLE_VERSION"
            exit 1
          fi

      - name: Build
        run: ./gradlew clean build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkriptDeploy-${{ github.ref_name }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}